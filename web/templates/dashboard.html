{% extends "base.html" %}

{% block content %}

<div class="cards">

    <!-- SANCIONES -->
    <div class="outer card-red">

        <div class="dot"></div>

        <div class="card">
            <div class="ray"></div>

            <div class="text">{{ stats.sanciones }}</div>
            <div>Sanciones</div>

            <div class="line topl"></div>
            <div class="line leftl"></div>
            <div class="line bottoml"></div>
            <div class="line rightl"></div>
        </div>

    </div>


    <!-- OPERATIVOS -->
    <div class="outer card-blue">

        <div class="dot"></div>

        <div class="card">
            <div class="ray"></div>

            <div class="text">{{ stats.operativos }}</div>
            <div>Operativos</div>

            <div class="line topl"></div>
            <div class="line leftl"></div>
            <div class="line bottoml"></div>
            <div class="line rightl"></div>
        </div>

    </div>


    <!-- RECUENTO ARMAMENTO -->
    <div class="outer card-orange">

        <div class="dot"></div>

        <div class="card">
            <div class="ray"></div>

            <div class="text">{{ recuento }}</div>
            <div>Tu recuento</div>

            <div class="line topl"></div>
            <div class="line leftl"></div>
            <div class="line bottoml"></div>
            <div class="line rightl"></div>
        </div>

    </div>

</div>
{% endblock %}
