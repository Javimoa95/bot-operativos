{% extends "base.html" %}

{% block content %}

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<div class="card-title">Sanciones</div>
<div class="card-number">{{ stats.sanciones }}</div>
</div>

<div class="card">
<div class="card-title">Operativos</div>
<div class="card-number">{{ stats.operativos }}</div>
</div>

<div class="card">
<div class="card-title">Movimientos</div>
<div class="card-number">{{ movimientos|length }}</div>
</div>

</div>

{% endblock %}
