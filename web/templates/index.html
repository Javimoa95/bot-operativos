<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>The Demons Bot</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0a0f2c;
    color:white;
}

/* HERO */

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background: radial-gradient(circle at center,#10184a,#05081a);
}

/* LOGO */

.logo{
    width:260px;
    margin-bottom:20px;
}

/* TITLE */

.title{
    font-size:60px;
    font-weight:bold;
    color:#ffd500;
    margin-bottom:10px;
}

/* SUBTITLE */

.subtitle{
    opacity:0.8;
    margin-bottom:40px;
}

/* BUTTONS */

.buttons{
    display:flex;
    gap:20px;
}

.btn{
    padding:14px 30px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    text-decoration:none;
    transition:0.2s;
}

/* LOGIN BUTTON */

.discord{
    background:#5865F2;
    color:white;
}

.discord:hover{
    transform:scale(1.05);
}

/* JOIN SERVER */

.join{
    background:#ffd500;
    color:black;
}

.join:hover{
    transform:scale(1.05);
}

/* INFO SECTION */

.info{
    padding:80px;
    background:#05081a;
    text-align:center;
}

.info h2{
    color:#ffd500;
}

.footer{
    margin-top:30px;
    opacity:0.6;
}

</style>
</head>

<body>

<div class="hero">

<img src="/static/images/logo_td.webp" class="logo">

<div class="title">
BOT DE THE DEMONS
</div>

<div class="subtitle">
Panel oficial de gestión del servidor
</div>

<div class="buttons">

<a class="btn discord" href="/login">
Iniciar sesión con Discord
</a>

<a class="btn join" href="https://discord.gg/QqGAjgUfhP" target="_blank">
Entrar al Discord
</a>

</div>

</div>

<div class="info">

<h2>The Demons</h2>

<p>
Gestión automática de operativos, sanciones y armamento del servidor.
</p>

<div class="footer">
Developed by The Demons
</div>

</div>

</body>
</html>
