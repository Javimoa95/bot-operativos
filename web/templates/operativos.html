{% extends "base.html" %} {% block content %}

<h1>Operativos</h1>

<table class="data-table">
	<tr>
		<th>Mensaje</th>
		<th>Fecha</th>
		<th>Columna</th>
		<th>Estado</th>
	</tr>

	{% for o in operativos %}

	<tr>
		<td>{{o.mensaje_id}}</td>

		<td>{{o.fecha}}</td>

		<td>{{o.columna}}</td>

		<td>
			{% if o.procesado %}
			<span class="badge red">Procesado</span>
			{% else %}
			<span class="badge green">Activo</span>
			{% endif %}
		</td>
	</tr>

	{% endfor %}
</table>

{% endblock %}
