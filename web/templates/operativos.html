{% extends "base.html" %}

{% block content %}

<h2>Operativos registrados</h2>

<table id="tablaOperativos" class="data-table">

	<thead>
		<tr>
			<th>Mensaje</th>
			<th>Fecha</th>
			<th>Columna</th>
			<th>Procesado</th>
		</tr>
	</thead>

	<tbody>

		{% for op in operativos %}

		<tr>
			<td>{{ op.mensaje_id }}</td>
			<td>{{ op.fecha }}</td>
			<td>{{ op.columna }}</td>
			<td>

				{% if op.procesado %}
				<span class="badge green">Sí</span>
				{% else %}
				<span class="badge red">No</span>
				{% endif %}

			</td>
		</tr>

		{% endfor %}

	</tbody>

</table>

{% endblock %}

<script>

	$(document).ready(function () {

		$('#tablaOperativos').DataTable({

			pageLength: 10,

			order: [[1, "desc"]],

			language: {
				search: "Buscar:",
				lengthMenu: "Mostrar _MENU_",
				info: "Mostrando _START_ a _END_ de _TOTAL_",
				paginate: {
					previous: "Anterior",
					next: "Siguiente"
				}
			}

		});

	});

</script>
