<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>The Demons Panel</title>

<link rel="stylesheet" href="/static/css/dashboard.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="sidebar" id="sidebar">

<div class="sidebar-top">

<img src="/static/images/logo_td.webp">

<span class="logo-text">The Demons</span>

</div>

<div class="nav">

<a class="nav-item" href="/dashboard">
<i data-lucide="home"></i>
<span>Inicio</span>
</a>

<a class="nav-item" href="/operativos">
<i data-lucide="shield"></i>
<span>Operativos</span>
</a>

<a class="nav-item" href="/sanciones">
<i data-lucide="scale"></i>
<span>Sanciones</span>
</a>

<a class="nav-item" href="/armamento">
<i data-lucide="sword"></i>
<span>Armamento</span>
</a>

</div>

<button class="collapse-btn" onclick="toggleSidebar()">

<i data-lucide="chevrons-left"></i>

</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<div class="title">
Panel de Control
</div>

<div class="user">

<img src="https://cdn.discordapp.com/avatars/{{user.id}}/{{user.avatar}}.png">

<span>{{user.username}}</span>

</div>

</div>


<div class="content">

{% block content %}{% endblock %}

</div>

</div>

</div>

</body>
</html>
